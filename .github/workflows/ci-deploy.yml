name: CI and Automated Deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && pip install -r backend/requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run deploy check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pwsh -NoLogo -NoProfile -File deploy-check.ps1
          else
            pwsh -NoLogo -NoProfile -File deploy-check.ps1 -Full
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Trigger deployment hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not set, so automatic deploy triggering was skipped."
            exit 0
          fi

          curl -fsSL -X POST "$DEPLOY_HOOK_URL"
